<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>العيادات - مستشفى المقطم التخصصي</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <div class="nav-logo">م</div>
      <div class="nav-brand-text">
        <h1>مستشفى المقطم التخصصي</h1>
        <span>حجز المواعيد الإلكتروني</span>
      </div>
    </a>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="index.html">الرئيسية</a>
      <a href="clinics.html" class="active">العيادات</a>
      <a href="booking.html">احجز موعد</a>
      <a href="admin.html" class="nav-btn">لوحة التحكم</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="breadcrumb">
      <a href="index.html">الرئيسية</a>
      <span>›</span>
      <span>العيادات</span>
    </div>
    <h1>🏥 العيادات المتخصصة</h1>
    <p>اختر العيادة المناسبة واحجز موعدك مع أفضل الأطباء</p>
  </div>
</div>

<div class="search-bar-section">
  <div class="search-bar-inner">
    <div class="search-input-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث عن عيادة أو تخصص..." oninput="filterClinics()">
    </div>
    <select class="form-control" id="sortSelect" style="width:180px;" onchange="filterClinics()">
      <option value="">الترتيب الافتراضي</option>
      <option value="price-asc">السعر: الأقل أولاً</option>
      <option value="price-desc">السعر: الأعلى أولاً</option>
      <option value="name">الاسم أبجدياً</option>
    </select>
  </div>
</div>

<section class="section">
  <div class="section-inner">
    <div id="clinicsCount" style="font-size:0.9rem;color:var(--text-muted);margin-bottom:20px;font-weight:600;"></div>
    <div class="clinics-grid" id="clinicsGrid"></div>
    <div id="noResults" class="empty-state" style="display:none;">
      <span class="emoji">🔍</span>
      <h3>لا توجد نتائج</h3>
      <p>لم نجد عيادات مطابقة لبحثك. جرّب كلمات أخرى.</p>
    </div>
  </div>
</section>

<footer style="background:var(--primary-dark);color:rgba(255,255,255,0.85);padding:32px 20px;text-align:center;">
  <p style="font-size:0.85rem;">© 2025 مستشفى المقطم التخصصي. جميع الحقوق محفوظة.</p>
</footer>

<script src="js/app.js"></script>
<script>
  let allClinics = [];

  function init() {
    allClinics = getClinics().filter(c => c.active);
    const savedSearch = sessionStorage.getItem('clinicSearch') || '';
    if (savedSearch) document.getElementById('searchInput').value = savedSearch;
    sessionStorage.removeItem('clinicSearch');
    filterClinics();
  }

  function filterClinics() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const sort = document.getElementById('sortSelect').value;
    let filtered = allClinics.filter(c =>
      c.name.toLowerCase().includes(q) || c.description.toLowerCase().includes(q)
    );
    if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
    else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
    else if (sort === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
    renderClinics(filtered);
  }

  function renderClinics(clinics) {
    const grid = document.getElementById('clinicsGrid');
    const noRes = document.getElementById('noResults');
    const count = document.getElementById('clinicsCount');
    count.textContent = `يتم عرض ${clinics.length} عيادة`;
    if (clinics.length === 0) {
      grid.innerHTML = '';
      noRes.style.display = 'block';
      return;
    }
    noRes.style.display = 'none';
    grid.innerHTML = clinics.map(c => {
      const doctors = getDoctorsByClinic(c.id);
      const availableSlots = getSlots().filter(s => s.clinicId === c.id && s.active && s.date >= new Date().toISOString().split('T')[0] && s.bookedCount < s.maxPatients);
      return `
        <div class="clinic-card" onclick="window.location.href='booking.html?clinicId=${c.id}'">
          <div class="clinic-card-top">
            <div class="clinic-icon" style="background:${c.color}20;font-size:2rem;">${c.icon}</div>
            <div class="clinic-card-info">
              <h3>${c.name}</h3>
              <p>${c.description}</p>
              <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;">
                <span class="clinic-doctors-count">👨‍⚕️ ${doctors.length} طبيب</span>
                <span class="clinic-doctors-count" style="color:${availableSlots.length > 0 ? 'var(--success)':'var(--danger)'}">
                  📅 ${availableSlots.length} موعد متاح
                </span>
              </div>
            </div>
          </div>
          <div class="clinic-card-bottom">
            <div class="clinic-price">
              <strong>${c.price}</strong> <span>جنيه</span><br>
              <span style="font-size:0.72rem;color:var(--text-muted);">سعر الكشف</span>
            </div>
            <button class="btn-book" onclick="event.stopPropagation();window.location.href='booking.html?clinicId=${c.id}'">
              ${availableSlots.length > 0 ? 'احجز الآن' : 'قائمة الانتظار'}
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  init();
</script>
</body>
</html>
